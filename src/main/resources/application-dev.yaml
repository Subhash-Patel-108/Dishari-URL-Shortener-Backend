spring:
  application:
    name: snapurl

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.dishari.in.infrastructure.messaging.event"


  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dishari_url?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASS:SUBH@123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          enabled: true
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 1000ms

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  app:
    redis:
      ttl:
        email-verification: 900        # 15 minutes in seconds
        url-redirect: 3600             # 1 hour
        rate-limit: 60                 # 1 minutes window
        forgot-password: 900           # 15 minutes in seconds
        token-blacklist: 86400         # 24 hours
    email:
      from: noreply@snapurl.com
      support-email: ${SUPPORT_EMAIL:support@snapurl.com}
      base-url: ${APP_BASE_URL:http://localhost:8080}

#    hikari:
#      pool-name: SnapUrl-HikariPool
#      maximum-pool-size: 20
#      minimum-idle: 5
#      idle-timeout: 300000
#      connection-timeout: 20000
#      max-lifetime: 1200000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 100
        order_inserts: true
        order_updates: true

#  flyway:
#    enabled: true
#    baseline-on-migrate: true
#
#  threads:
#    virtual:
#      enabled: true



jwt:
  secret: ${JWT_SECRET:867760380f8f4d7fb0752e7331c7412653f159901d4f42a12b792094f05421d72ca8ac2e9d057de4a517dfa2b0150fb3}
  access-token-expiration-in-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_IN_MS:3600000}
  refresh-token-expiration-in-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_IN_MS:86400000}


cookie:
  refrsh-token-cookie-name: ${REFRESH_TOKEN_COOKIE_NAME:refreshToken}
  issuer: ${ISSUER:localhost}
  cookie-secure: ${COOKIE_SECURE:true}
  cookie-http-only: ${COOKIE_HTTP_ONLY:true}
  cookie-same-site: ${COOKIE_SAME_SITE:Lax}
  cookie-domain: ${JWT_COOKIE_DOMAIN:localhost}
  cookie-max-age-in-seconds: ${COOKIE_EXPIRATION_TIME_IN_seconds:86400}
  cookie-path: ${COOKIE_PATH:/}


password:
  pepper: ${PASSWORD_PEPPER}

app:
  snowflake:
    node-id: ${SNOWFLAKE_NODE_ID:1}   # unique per instance — set via env in prod
    epoch: 1700000000000              # custom epoch — Nov 14 2023 (ms)
  slug:
    default-length: ${SLUG_DEFAULT_LENGTH:7}
    max-retry-attempts: ${SLUG_MAX_RETRY_ATTEMPTS:3}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  kafka:
    groups:
      qr-generation: qr-generation-group
      bulk-creation: bulk-url-group
    topics:
      qr-generation: qr-generation
      bulk-url-creation: bulk-url-creation
  qr:
    storage-path: ./uploads/qr-codes