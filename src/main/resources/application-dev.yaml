spring:
  application:
    name: snapurl

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/dishari_url?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASS:SUBH@123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          enabled: true
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 1000ms

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  app:
    redis:
      ttl:
        email-verification: 900        # 15 minutes in seconds
        url-redirect: 3600             # 1 hour
        rate-limit: 60                 # 1 minutes window
        token-blacklist: 86400         # 24 hours
    email:
      from: noreply@snapurl.com
      support-email: ${SUPPORT_EMAIL:support@snapurl.com}
      base-url: ${APP_BASE_URL:http://localhost:8080}

#    hikari:
#      pool-name: SnapUrl-HikariPool
#      maximum-pool-size: 20
#      minimum-idle: 5
#      idle-timeout: 300000
#      connection-timeout: 20000
#      max-lifetime: 1200000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

#  flyway:
#    enabled: true
#    baseline-on-migrate: true
#
#  threads:
#    virtual:
#      enabled: true

jwt:
  secret: ${JWT_SECRET:867760380f8f4d7fb0752e7331c7412653f159901d4f42a12b792094f05421d72ca8ac2e9d057de4a517dfa2b0150fb3}
  access-token-expiration-in-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_IN_MS:3600000}
  refresh-token-expiration-in-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_IN_MS:86400000}


cookie:
  refrsh-token-cookie-name: ${REFRESH_TOKEN_COOKIE_NAME:refreshToken}
  issuer: ${ISSUER:localhost}
  cookie-secure: ${COOKIE_SECURE:true}
  cookie-http-only: ${COOKIE_HTTP_ONLY:true}
  cookie-same-site: ${COOKIE_SAME_SITE:Lax}
  cookie-domain: ${JWT_COOKIE_DOMAIN:localhost}
  cookie-max-age-in-seconds: ${COOKIE_EXPIRATION_TIME_IN_seconds:86400}
  cookie-path: ${COOKIE_PATH:/}